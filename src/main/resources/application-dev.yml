#application-dev.yml
#개발(dev) 프로필용 설정 파일

#로컬 포트=8080
server:
    port: ${SERVER_PORT:8080}

logging:
    config: classpath:log4j2-dev.yml
    level:
        org.springframework.cache: DEBUG

spring:
    servlet:
        multipart:
            location: ${MULTIPART_LOCATION?Configuration is required.}
    freemarker:
        cache: ${FREEMARKER_CACHE:true}
    datasource:
        primary:
            driver-class-name: org.mariadb.jdbc.Driver
            jdbc-url: ${JDBC_URL?Configuration is required.}
            username: ${JDBC_USERNAME?Configuration is required.}
            password: ${JDBC_PASSWORD?Configuration is required.}

    jpa:
        database: mysql
        database-platform: org.hibernate.dialect.MariaDBDialect
        show-sql: true
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MariaDBDialect
                generate-ddl: true
                format_sql: true
                use_sql_comments: true

    sql:
        init:
            # mode: always / embedded / never
            mode: never
            platform: mariadb
            continue-on-error: true

    data:
        redis:
            host: ${REDIS_HOST}
            port: ${REDIS_PORT}
            password: ${REDIS_PASSWORD}

    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER}
        consumer:
            group-id: dreamdiary
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

    elasticsearch:
        username: ${ELASTIC_USERNAME}
        password: ${ELASTIC_PASSWORD}
        uris: ${ELASTIC_URIS}

