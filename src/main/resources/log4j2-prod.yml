#log4j2 설정 파일 (로컬local)

Configutation:
    status: info

    Properties:
        Property:
            - name: log-path
              value: "log"

    Appenders:
        File:
            name: File_Appender
            fileName: ${log-path}/logfile.log
            PatternLayout:
            pattern: ${log-format}
        RollingFile:
          - name: RollingFile_Appender
            fileName: ${log-path}/rollingfile.log
            filePattern: "log/archive/rollingfile.log.%d{yyyy-MM-dd}.gz"
            PatternLayout:
                pattern: ${log-format}
            Policies:
                SizeBasedTriggeringPolicy:
                    size: 1GB
                TimeBasedTriggeringPolicy:
                    interval: 1
                    modulate: true

    Loggers:
        Root:
            level: info
            AppenderRef:
              - ref: Console_Appender
              - ref: File_Appender
              - ref: RollingFile_Appender
        Logger:
            - name: dreamdiary.nicheblog.io
              additivity: false
              level: debug
              AppenderRef:
                  - ref: Console_Appender
                  - ref: File_Appender
                  - ref: RollingFile_Appender