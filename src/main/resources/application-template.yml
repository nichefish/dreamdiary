#application-local.yml
#prod

#로컬 포트=8080
server:
    port: 8080

spring:
    servlet:
        multipart:
            location: upfile/
    freemarker:
        cache: true
    datasource:
        primary:
            driver-class-name: org.mariadb.jdbc.Driver
            #"rewriteBatchedStatements" is needed for batch insert
            jdbc-url: jdbc:mariadb://_jdbc-url:port/database-name?useSSL=false&useUnicode=true&characterEncoding=utf8&rewriteBatchedStatements=true
            username: _id
            password: _password

    jpa:
        database: mysql
        database-platform: org.hibernate.dialect.MariaDBDialect
        show-sql: true
        hibernate:
            ddl-auto: none
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MariaDBDialect
                generate-ddl: true
                format_sql: true
                use_sql_comments: true

    sql:
        init:
            # mode: always / embedded / never
            mode: never
            platform: mariadb
            continue-on-error: true

    data:
        redis:
            host: localhost
            port: 6379

    kafka:
        bootstrap-servers: localhost:9092
        consumer:
            group-id: dreamdiary
            auto-offset-reset: earliest
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: org.apache.kafka.common.serialization.StringSerializer

    elasticsearch:
        username: username
        password: password
        uris: [0.0.0.0:1111]