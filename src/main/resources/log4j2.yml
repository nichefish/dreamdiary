#log4j2 설정 파일 (공통)

Configutation:

    Appenders:
        Console:
            name: Console_Appender
            target: SYSTEM_OUT
            PatternLayout:
                pattern: ${log-format}
        File:
            name: File_Appender
            fileName: ${log-path}/logfile.log
            PatternLayout:
            pattern: ${log-format}
        RollingFile:
            - name: RollingFile_Appender
              fileName: ${log-path}/rollingfile.log
              filePattern: "rollingfile.log.%d{yyyy-MM-dd}.gz"
              PatternLayout:
                  pattern: ${log-format}
              Policies:
                  SizeBasedTriggeringPolicy:
                      size: 1GB
                  TimeBasedTriggeringPolicy:
                      interval: 1
                      modulate: true
